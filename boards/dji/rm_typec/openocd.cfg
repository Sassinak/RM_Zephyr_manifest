source [find interface/cmsis-dap.cfg]

transport select swd

source [find target/stm32f4x.cfg]

adapter speed 1000

# Zephyr on STM32F4 typically places SRAM at 0x2000_0000.
# RTT control block (_SEGGER_RTT) is expected in RAM section,
# so search in the main SRAM window for reliable attach.
proc setup_rtt {} {
	echo "RTT: setup search in SRAM (0x20000000)"
	# Scan a window large enough for RTT control block and buffers.
	rtt setup 0x20000000 0x20000 "SEGGER RTT"
	rtt start
}

# Configure RTT only once for the CPU target.
proc configure_rtt_for_cpu {} {
	echo "Configuring RTT for CPU target..."

	# Configure RTT event handlers on CPU target.
	stm32f4x.cpu configure -event gdb-attach {
		echo "GDB attached - setting up RTT..."
		setup_rtt
	}

	stm32f4x.cpu configure -event reset-init {
		echo "Reset-init: Setting up RTT..."
		setup_rtt
	}

	# When using runToEntryPoint=main, CPU may halt after init.
	# Re-configure RTT here to improve control block detection.
	stm32f4x.cpu configure -event halted {
		echo "CPU halted: Setting up RTT..."
		setup_rtt
	}
}

# Initialize and defer RTT event configuration slightly.
init
after 300 configure_rtt_for_cpu
